<div class="container-fluid mb-5">

    <div class="row justify-content-center">

        <div class="col-11 col-md-8">

            <!--Nome da Página-->
            <h5 class="mt-3 text-center">Sistema de Controle Financeiro - {{titulo}} Categoria</h5>

            <a routerLink="/categoria" class="btn btn-outline-primary mt-4"><i class="fas fa-undo-alt me-1"></i>Voltar</a>

            <form class="mt-4">

                <input type="hidden" name="id">

                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" class="form-control" id="nome">
                </div>

                <div class="form-group mt-3">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" cols="30" rows="10" class="form-control"></textarea>
                </div>

                <button type="submit" class="btn btn-primary mt-4 mb-5"><i class="far fa-save me-1"></i>Salvar</button>

            </form>

        </div>

    </div>

</div>
