<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-11 col-md-8" *ngIf="exibeSpinner == false">

            <!--Nome da Página-->
            <h5 class="mt-3 text-center">Sistema de Controle Financeiro - {{titulo}} Categoria</h5>

            <a routerLink="/categoria" class="btn btn-outline-primary mt-4"><i class="fas fa-undo-alt me-1"></i>Voltar</a>

            <form [formGroup]="formCategoria" (submit)="enviar()" class="mt-4">

                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input formControlName="nome" type="text" class="form-control" id="nome" [ngClass]="{'is-invalid': verificaCampo('nome')}" autocomplete="off">
                    <span class="float-end text-end">{{tamanhoCampo("nome")}}/60</span>

                    <div class="invalid-feedback" *ngIf="formCategoria.get('nome').errors?.required">Nome é requerido!</div>
                    <div class="invalid-feedback" *ngIf="formCategoria.get('nome').errors?.minlength">Nome menor que 3 caracteres</div>
                    <div class="invalid-feedback" *ngIf="formCategoria.get('nome').errors?.maxlength">Nome maior que 60 caracteres</div>
                </div>

                <div class="form-group mt-3">
                    <label for="descricao">Descrição:</label>
                    <textarea formControlName="descricao" id="descricao" cols="30" rows="8" class="form-control" [ngClass]="{'is-invalid': verificaCampo('descricao')}"></textarea>
                    <span class="float-end text-end">{{tamanhoCampo("descricao")}}/255</span>
                    <div class="invalid-feedback" *ngIf="formCategoria.get('descricao').errors?.maxlength">Descrição é maior que 255 caracteres</div>
                </div>

                <button [disabled]="formCategoria.invalid || desativaBotaoSalvar" type="submit" class="btn btn-primary mt-4">
                    <ng-container *ngIf="exibeSpinnerSalvar == false">
                        <i class="far fa-save me-1"></i>Salvar
                    </ng-container>
                    <ng-container *ngIf="exibeSpinnerSalvar">
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        Salvando...
                    </ng-container>
                </button>

            </form>

        </div>

        <div class="col-11 col-md-8" *ngIf="exibeSpinner">
            <div class="spinner">
                <div class="spinner-grow text-sencondary"  style="width: 3.5rem; height: 3.5rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

    </div>

</div>
