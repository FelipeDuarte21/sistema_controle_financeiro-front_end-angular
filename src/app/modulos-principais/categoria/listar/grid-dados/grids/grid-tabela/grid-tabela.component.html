<div class="row justify-content-center">

    <div class="col-12">

        <div class="table-responsive">
            <table class="table table-borderless">
                <thead class="table-light">
                    <tr class="nao-quebra-tabela">
                        <th><i class="fas fa-tags me-1"></i>Categoria</th>
                        <th><i class="fas fa-comment-dots me-1"></i>Descrição</th>
                        <th class="text-center"><i class="fas fa-calendar-alt me-1"></i>Data de Criação</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>

                    <tr class="nao-quebra-tabela" *ngFor="let categoria of categorias">
                        <td style="font-size: 18px;">{{categoria?.nome}}</td>
                        <td>{{categoria?.descricao}}</td>
                        <td class="text-center">{{categoria?.dataCadastro | date: 'dd/MM/yyyy'}}</td>
                        <td class="text-center">
                            <a [routerLink]="['/lancamento']" [queryParams]="{categoria:categoria?.id}" class="btn btn-primary btn-sm me-1"><i class="fas fa-hand-holding-usd me-1"></i>Lançamentos</a> 
                            <btn-editar rota="categoria/atualizar" [id]="categoria?.id" [parametros]="null"></btn-editar>
                            <btn-excluir [id]="categoria?.id" (excluir)="onClick($event)"></btn-excluir>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
