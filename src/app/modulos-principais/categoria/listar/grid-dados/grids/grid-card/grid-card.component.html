<div class="row">
       
    <div class="col-12 col-md-6 col-lg-4 col-xl-3 mt-2" *ngFor="let categoria of categorias">
        <div class="card linha-card">
            <div class="card-body pt-2">
                <h6 class="mb-0 mt-0"><small><i class="fas fa-tags me-1" style="font-size: 12px;"></i>Categoria</small></h6>
                <span class="mt-0 fw-bolder" style="font-size: 24px;">{{categoria?.nome}}</span>

                <h6 class="mt-3 mb-0"><i class="fas fa-comment-dots me-1"></i>Descrição</h6>
                <span class="mt-0 text-justify">{{categoria?.descricao}}</span>

                <h6 class="mt-3 mb-0"><i class="fas fa-calendar-alt me-1"></i>Data de Criação</h6>
                <span class="mt-0">{{categoria?.dataCadastro | date: 'dd/MM/yyyy'}}</span>

                <div class="d-grid col-12">
                    <a [routerLink]="['/lancamento']" [queryParams]="{categoria:categoria?.id}" class="btn btn-primary d-block mt-3"><i class="fas fa-hand-holding-usd me-1"></i>Lançamentos</a>
                </div>

                <div class="d-grid col-12">
                    <a [routerLink]="['/anotacoes']" [queryParams]="{categoria:categoria?.id}" class="btn btn-primary d-block mt-3"><i class="fas fa-book me-1"></i>Anotações</a>
                </div>
                        
            </div>
            <div class="card-footer">
                <btn-editar rota="categoria/atualizar" [id]="categoria?.id" [parametros]="null"></btn-editar>
                <btn-excluir [id]="categoria?.id" (excluir)="onClick($event)"></btn-excluir>
            </div>
        </div>
    </div>
        
</div>
