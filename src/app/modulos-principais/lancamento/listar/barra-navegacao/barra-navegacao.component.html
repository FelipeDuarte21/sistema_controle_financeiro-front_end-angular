<div class="row mt-5">

    <!--Quantidade de categorias na página-->
    <div class="col-4 col-md-4">
        <div class="row justify-content-start">
            <div class="col-12 col-md-5 col-lg-4 col-xl-3">
                <quantidade-registro [qtdOpcoes]="qtdOpcoes" [opcaoEscolhida]="qtdAtual" (alteraQuantidade)="onMudarQuantidade($event)"></quantidade-registro>
            </div>
        </div>
    </div>
    
    <!--Paginação-->
    <div class="col-8 col-md-4">
        <paginacao [paginaAtual]="paginaAtual" [totalPagina]="totalPagina"
            (anterior)="onMudarPagina($event)" (proximo)="onMudarPagina($event)"></paginacao>
    </div>

    <div class="col-xxl-4 mt-3 text-start text-md-end fst-italic d-none d-xxl-block">
        Legenda:
        <span class="text-success">
            <i class="fas fa-square me-1"></i>Provento
        </span>
        <span class="text-danger">
            <i class="fas fa-square me-1"></i>Despesa
        </span>
    </div>

</div>
