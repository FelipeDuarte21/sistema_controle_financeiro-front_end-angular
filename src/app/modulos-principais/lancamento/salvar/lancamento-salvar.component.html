<div class="container-fluid mb-5">

    <div class="row justify-content-center">

        <div class="col-11 col-md-8">

            <!--Nome da Página-->
            <h5 class="mt-3 text-center">Sistema de Controle Financeiro - <i class="fas fa-hand-holding-usd me-1"></i>Lançamentos - Lançar</h5>

            <!--Botão Voltar-->
            <a routerLink="/lancamento/1" class="btn btn-outline-primary mt-4 mb-2"><i class="fas fa-undo-alt me-1"></i>Voltar</a>

            <form class="mt-4 mb-5">

                <div class="form-group">
                    <label for="tipo">Tipo:</label>
                    <select name="" id="tipo" class="form-control">
                        <option value="0">Provento</option>
                        <option value="1">Despesa</option>
                    </select>
                </div>

                <div class="form-group" class="mt-3">
                    <label for="valor">Valor:</label>
                    <input type="number" min="0.01" step="0.01" id="valor" class="form-control">
                </div>

                <div class="form-group" class="mt-3">
                    <label for="nome">Nome:</label>
                    <input type="text" class="form-control" id="nome">
                </div>

                <div class="form-group" class="mt-3">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" cols="30" rows="10" class="form-control"></textarea>
                </div>

                <button class="btn btn-primary mt-3"><i class="fas fa-save me-1"></i>Lançar</button>
                

            </form>

        </div>

    </div>

</div>
