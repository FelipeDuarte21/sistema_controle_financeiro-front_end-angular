<div class="container-fluid mb-5">

    <div class="row justify-content-center">

        <div class="col-11 col-md-8 col-lg-5">

            <!--Nome da Página-->
            <h5 class="mt-4 text-center">Sistema de Controle Financeiro - <i class="fas fa-user-plus me-1"></i>Cadastro de Usuário</h5>

            <!--Botão Voltar-->
            <a routerLink="/" class="btn btn-outline-primary mt-4 mb-2"><i class="fas fa-undo-alt me-1"></i>Voltar</a>

            <form class="mt-4">

                <div class="form-group mb-4">
                    <label class="mb-0" for="nome">Nome</label>
                    <input type="text" class="form-control" id="nome">
                    <span class="float-end text-end">0/50</span>
                </div>

                <div class="form-group mb-4">
                    <label class="mb-0" for="email">Email</label>
                    <input type="text" class="form-control" id="email">
                    <span class="float-end text-end">0/80</span>
                </div>

                <div class="form-group mb-5">
                    <label class="mb-0" for="senha">Senha</label>
                    <input type="password" class="form-control" id="senha">
                    <span class="float-end text-end">0/15</span>
                </div>

                <button class="btn btn-primary"><i class="fas fa-user-plus me-1"></i>Cadastrar</button>


            </form>
        
        </div>

    </div>

</div>
